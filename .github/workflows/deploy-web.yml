name: Deploy Web App

on:
  push:
    branches:
      - main
      - master
    paths-ignore:
      - "TowncoreMobile/**"
      - ".github/workflows/eas-*.yml"
  workflow_dispatch:

jobs:
  deploy:
    name: Deploy To Server
    runs-on: ubuntu-latest

    steps:
      - name: Validate deploy secrets
        shell: bash
        env:
          SERVER_HOST: ${{ secrets.SERVER_HOST }}
          SERVER_PORT: ${{ secrets.SERVER_PORT }}
          SERVER_USER: ${{ secrets.SERVER_USER }}
          SERVER_SSH_KEY: ${{ secrets.SERVER_SSH_KEY }}
          SERVER_SSH_PASSPHRASE: ${{ secrets.SERVER_SSH_PASSPHRASE }}
          SERVER_APP_PATH: ${{ secrets.SERVER_APP_PATH }}
          SERVER_PUBLIC_HTML: ${{ secrets.SERVER_PUBLIC_HTML }}
        run: |
          set -euo pipefail

          required=(
            SERVER_HOST
            SERVER_PORT
            SERVER_USER
            SERVER_SSH_KEY
            SERVER_APP_PATH
            SERVER_PUBLIC_HTML
          )

          for name in "${required[@]}"; do
            if [ -z "${!name:-}" ]; then
              echo "Missing required repository secret: ${name}"
              exit 1
            fi
          done

          # If the private key is encrypted, this must be set.
          # This check is intentionally non-fatal to allow unencrypted keys.
          if [ -z "${SERVER_SSH_PASSPHRASE:-}" ]; then
            echo "Warning: SERVER_SSH_PASSPHRASE is empty."
            echo "If your SSH key is passphrase protected, deployment will fail."
          fi

      - name: Deploy over SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          passphrase: ${{ secrets.SERVER_SSH_PASSPHRASE }}
          port: ${{ secrets.SERVER_PORT }}
          timeout: 300s
          command_timeout: 30m
          script_stop: true
          script: |
            set -e

            APP_PATH="${{ secrets.SERVER_APP_PATH }}"
            PUBLIC_HTML="${{ secrets.SERVER_PUBLIC_HTML }}"

            # ── 1. Pull latest code into app folder (outside web root) ──
            cd "$APP_PATH"
            php artisan down --retry=5 --secret="deploying" || true
            git pull origin "${{ github.ref_name }}"

            # ── 2. PHP dependencies ──
            composer install --no-dev --prefer-dist --optimize-autoloader --no-interaction

            # ── 3. Frontend assets ──
            if command -v npm &>/dev/null && [ -f package.json ]; then
              npm ci
              npm run build
            fi

            # ── 4. Database migrations ──
            php artisan migrate --force

            # ── 5. Clear and warm caches ──
            php artisan optimize:clear
            php artisan config:cache
            php artisan route:cache
            php artisan view:cache
            php artisan event:cache

            # ── 6. Link public/ into web root ──
            # Copies fresh build assets into public_html so only public/ is exposed
            if command -v rsync &>/dev/null; then
              rsync -a --delete "$APP_PATH/public/" "$PUBLIC_HTML/"
            else
              rm -rf "$PUBLIC_HTML"/*
              cp -a "$APP_PATH/public/." "$PUBLIC_HTML/"
            fi

            # ── 7. Fix permissions ──
            chmod -R 755 "$APP_PATH/storage" "$APP_PATH/bootstrap/cache"
            chown -R www-data:www-data "$APP_PATH/storage" "$APP_PATH/bootstrap/cache" 2>/dev/null || true

            # ── 8. Bring site back online ──
            php artisan up