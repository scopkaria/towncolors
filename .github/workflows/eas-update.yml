name: EAS Update (OTA)

on:
  push:
    branches:
      - main
      - master
    paths:
      - 'TowncoreMobile/**'

jobs:
  update:
    name: Push OTA Update
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: TowncoreMobile

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: TowncoreMobile/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Setup EAS CLI
        uses: expo/expo-github-action@v8
        with:
          eas-version: latest
          token: ${{ secrets.EXPO_TOKEN }}

      - name: Push OTA update to preview
        run: eas update --branch preview --message "${{ github.event.head_commit.message }}"

      - name: Push OTA update to production
        run: eas update --branch production --message "${{ github.event.head_commit.message }}"
